version: 2.1

jobs:
  push-wiki:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Push to original project wiki
          command: |
            git config user.email "${GITHUB_EMAIL}"
            git config user.name "${GITHUB_USERNAME}"
            git remote remove origin
            git remote add origin https://${GITHUB_API_KEY}@github.com/andrej-nemanic/VirtualEstate_Project.wiki.git > /dev/null 2>&1
            git push --force origin main:master

workflows:
  main-workflow:
    jobs:
      - push-wiki:
          filters:
            branches:
              only:
                - main